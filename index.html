<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantik Sahabat 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* PARTICLE CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* GLASS UI */
.app{
width:380px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:30px;
padding:25px;
text-align:center;
z-index:10;
position:relative;
box-shadow:0 0 40px rgba(255,77,109,0.4);
border:1px solid rgba(255,255,255,0.2);
transition:0.2s;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px #ff4d6d;}
to{box-shadow:0 0 50px #ff85a2;}
}

/* SECTIONS */
.section{
display:none;
opacity:0;
transform:scale(0.8);
transition:0.4s;
}

.active{
display:block;
opacity:1;
transform:scale(1);
}

/* BUTTONS */
button{
background:linear-gradient(45deg,#ff4d6d,#ff85a2);
border:none;
color:white;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
margin:5px;
}

button:hover{
transform:scale(1.15);
box-shadow:0 0 20px #ff4d6d;
}

/* IMAGES */
.pic{
width:90px;
height:90px;
object-fit:cover;
border-radius:15px;
margin:5px;
transition:0.3s;
}

.pic:hover{
transform:scale(1.3);
}

/* MEMORY */
#memoryGrid{
display:grid;
grid-template-columns:repeat(4,60px);
gap:10px;
justify-content:center;
}

.card{
width:60px;
height:60px;
background:#ff4d6d;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
}

/* VISUALIZER */
#visualizer{
display:flex;
gap:3px;
justify-content:center;
margin-top:10px;
}

.bar{
width:4px;
height:20px;
background:#ff4d6d;
animation:beat 0.5s infinite alternate;
}

@keyframes beat{
from{height:10px;}
to{height:30px;}
}

/* PLAYER */
#player{
position:absolute;
font-size:30px;
top:200px;
left:150px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="app">

<h1>Aisyah 💖</h1>

<div>
<button onclick="show('home')">Home</button>
<button onclick="show('gallery')">Gallery</button>
<button onclick="show('memory')">Memory 🧠</button>
<button onclick="show('speed')">Speed ⚡</button>
<button onclick="show('dodge')">Dodge 🏃</button>
<button onclick="show('flappy')">Flappy 🐤</button>
<button onclick="show('secret')">Secret 💌</button>
</div>

<div id="home" class="section active">
<p>You matter ❤️</p>
</div>

<div id="gallery" class="section">
<img src="Images/aisyah1.jpg" class="pic">
<img src="Images/aisyah2.jpg" class="pic">
<img src="Images/aisyah3.jpg" class="pic">
</div>

<div id="memory" class="section">
<h3>Memory Game</h3>
<div id="memoryGrid"></div>
</div>

<div id="speed" class="section">
<button onclick="startSpeed()">Start</button>
<h3 id="speedScore">0</h3>
</div>

<div id="dodge" class="section">
<div id="player">😌</div>
</div>

<div id="flappy" class="section">
<canvas id="gameCanvas" width="300" height="400"></canvas>
</div>

<div id="secret" class="section">
<h2>Will you be mine 😏</h2>
<button onclick="yesClicked()">Yes ❤️</button>
<button id="noBtn" onmouseover="moveNo()">No 😈</button>
</div>

<div id="visualizer"></div>

</div>

<script>

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#ff4d6d";
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="memory") startMemory();
}

/* MEMORY */
const emojis=["💖","💖","✨","✨","😌","😌","🔥","🔥"];
let opened=[];

function startMemory(){
const grid=document.getElementById("memoryGrid");
grid.innerHTML="";
emojis.sort(()=>Math.random()-0.5);

emojis.forEach(e=>{
const card=document.createElement("div");
card.className="card";
card.innerText="?";

card.onclick=()=>{
card.innerText=e;
opened.push({card,e});

if(opened.length===2){
if(opened[0].e!==opened[1].e){
setTimeout(()=>{
opened.forEach(o=>o.card.innerText="?");
opened=[];
},500);
}else opened=[];
}
};

grid.appendChild(card);
});
}

/* SPEED */
let clicks=0, playing=false;
function startSpeed(){
clicks=0; playing=true;
setTimeout(()=>{playing=false; alert("Score: "+clicks);},3000);
}
document.addEventListener("click",()=>{if(playing)clicks++;});

/* NO BUTTON */
let noSpeed=1;
function moveNo(){
const btn=document.getElementById("noBtn");
btn.style.position="fixed";
btn.style.left=Math.random()*window.innerWidth+"px";
btn.style.top=Math.random()*window.innerHeight+"px";
btn.style.transform=`scale(${1-noSpeed*0.1})`;
noSpeed++;
}

/* YES */
function yesClicked(){
document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:40vh;'>I knew it 😏❤️</h1>";
}

/* CURSOR TRAIL */
document.addEventListener("mousemove",e=>{
const dot=document.createElement("div");
dot.style.position="fixed";
dot.style.left=e.clientX+"px";
dot.style.top=e.clientY+"px";
dot.style.width="6px";
dot.style.height="6px";
dot.style.background="#ff4d6d";
dot.style.borderRadius="50%";
document.body.appendChild(dot);
setTimeout(()=>dot.remove(),300);
});

/* CLICK BURST */
document.addEventListener("click",e=>{
for(let i=0;i<15;i++){
const p=document.createElement("div");
p.innerText="💖";
p.style.position="fixed";
p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";
document.body.appendChild(p);

const x=(Math.random()-0.5)*200;
const y=(Math.random()-0.5)*200;

p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{duration:700});

setTimeout(()=>p.remove(),700);
}
});

</script>

</body>
</html>
